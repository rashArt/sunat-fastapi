# =============================================================================
# postgresql.conf — configuración optimizada para contenedor Docker
#
# Diseñado para un contenedor con 1-2 GB de RAM asignada.
# Ajustar shared_buffers y effective_cache_size según la asignación real.
# =============================================================================

# ---------------------------------------------------------------------------
# Red
# ---------------------------------------------------------------------------
listen_addresses = '*'           # aceptar conexiones desde todos los interfaces (Docker network)
max_connections = 100            # reducir a 50 si se usa pgBouncer

# ---------------------------------------------------------------------------
# Memoria (base: contenedor con 1 GB RAM)
# ---------------------------------------------------------------------------
shared_buffers         = 256MB   # ~25% RAM del contenedor
effective_cache_size   = 768MB   # ~75% RAM del contenedor
work_mem               = 16MB    # por operación sort/hash (n conexiones × n sort ops)
maintenance_work_mem   = 64MB    # VACUUM, CREATE INDEX, etc.
temp_buffers           = 8MB

# ---------------------------------------------------------------------------
# Checkpoint / WAL
# ---------------------------------------------------------------------------
wal_buffers                    = 16MB
checkpoint_completion_target   = 0.9
min_wal_size                   = 1GB
max_wal_size                   = 4GB
wal_level                      = replica   # necesario para replicación futura

# ---------------------------------------------------------------------------
# Planner (disco SSD dentro del contenedor)
# ---------------------------------------------------------------------------
random_page_cost         = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# ---------------------------------------------------------------------------
# Paralelismo
# ---------------------------------------------------------------------------
max_worker_processes         = 4
max_parallel_workers         = 4
max_parallel_workers_per_gather = 2

# ---------------------------------------------------------------------------
# Logging — solo consultas lentas (> 500 ms)
# ---------------------------------------------------------------------------
log_min_duration_statement = 500
log_connections            = off
log_disconnections         = off
log_line_prefix            = '%t [%p]: [%l-1] user=%u,db=%d,app=%a '
log_checkpoints            = on
log_lock_waits             = on

# ---------------------------------------------------------------------------
# Locale / encoding
# ---------------------------------------------------------------------------
lc_messages  = 'en_US.utf8'
lc_monetary  = 'es_PE.utf8'
lc_numeric   = 'es_PE.utf8'
lc_time      = 'es_PE.utf8'
