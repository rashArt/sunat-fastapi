# =============================================================================
# redis.conf — configuración para contenedor Docker
#
# Habilita persistencia AOF, limita memoria y define política de evicción
# adecuada para caché de sesiones/tickets SUNAT.
# =============================================================================

# ---------------------------------------------------------------------------
# Red
# ---------------------------------------------------------------------------
bind 0.0.0.0
# protected-mode solo tiene sentido si Redis está expuesto a internet sin contraseña.
# Dentro de la red Docker (bridge privado) la seguridad la da el aislamiento de red.
protected-mode no
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# ---------------------------------------------------------------------------
# Memoria — ajustar según RAM asignada al contenedor
# ---------------------------------------------------------------------------
maxmemory 256mb
# allkeys-lru: descarta las claves menos usadas cuando se alcanza maxmemory.
# Apropiado para caché; cambiar a 'noeviction' si se usa como cola estricta.
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ---------------------------------------------------------------------------
# Persistencia (AOF + RDB)
# ---------------------------------------------------------------------------
# RDB snapshots
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# AOF — garantiza durabilidad de tickets
appendonly yes
appendfilename "appendonly.aof"
# appendfsync everysec balance rendimiento / durabilidad
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
loglevel notice
# logfile stdout del contenedor
logfile ""

# ---------------------------------------------------------------------------
# Rendimiento
# ---------------------------------------------------------------------------
hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
